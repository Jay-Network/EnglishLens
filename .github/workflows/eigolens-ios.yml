name: EigoLens iPad - Build & Deploy

on:
  push:
    branches: [master]
    paths:
      - 'ipad-app/**'
      - '.github/workflows/eigolens-ios.yml'
  pull_request:
    paths:
      - 'ipad-app/**'
      - '.github/workflows/eigolens-ios.yml'
  workflow_dispatch:

env:
  BUNDLE_ID: 'com.jworks.eigolens'
  SCHEME: 'EigoLens'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-14
    defaults:
      run:
        working-directory: ipad-app

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app || \
          sudo xcode-select -s /Applications/Xcode_16.1.app || \
          sudo xcode-select -s /Applications/Xcode_16.0.app || \
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Create xcconfig
        run: |
          cat > EigoLens.xcconfig << 'XCCONFIG'
          PRODUCT_BUNDLE_IDENTIFIER = com.jworks.eigolens
          DEVELOPMENT_TEAM = NONE
          XCCONFIG

      - name: Stage WordNet database
        run: |
          if [ -f "../app/src/main/assets/wordnet.db" ]; then
            cp ../app/src/main/assets/wordnet.db EigoLens/Resources/wordnet.db
            echo "WordNet DB staged from Android project"
            ls -lh EigoLens/Resources/wordnet.db
          else
            echo "WARNING: WordNet DB not found - definition tests will be limited"
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iPad Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project EigoLens.xcodeproj \
            -scheme EigoLens \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4),OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/xcodebuild.log | xcpretty || {
              echo "=== Build errors ==="
              grep -A 3 "error:" /tmp/xcodebuild.log | tail -30
              exit 1
            }

      - name: Run Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project EigoLens.xcodeproj \
            -scheme EigoLens \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4),OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | xcpretty || {
              echo "Tests failed"
              exit 1
            }

  deploy-testflight:
    name: Deploy to TestFlight
    needs: build-and-test
    runs-on: macos-14
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    defaults:
      run:
        working-directory: ipad-app

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app || \
          sudo xcode-select -s /Applications/Xcode_16.1.app || \
          sudo xcode-select -s /Applications/Xcode_16.0.app || \
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Create xcconfig
        env:
          EL_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EL_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          EL_CLAUDE_KEY: ${{ secrets.CLAUDE_API_KEY }}
          EL_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EL_SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          cat > EigoLens.xcconfig << XCCONFIG
          PRODUCT_BUNDLE_IDENTIFIER = com.jworks.eigolens
          DEVELOPMENT_TEAM = ${EL_TEAM_ID}
          GEMINI_API_KEY = ${EL_GEMINI_KEY}
          CLAUDE_API_KEY = ${EL_CLAUDE_KEY}
          SUPABASE_URL = ${EL_SUPABASE_URL}
          SUPABASE_ANON_KEY = ${EL_SUPABASE_KEY}
          XCCONFIG

      - name: Stage WordNet database
        run: |
          DB_SRC="../app/src/main/assets/wordnet.db"
          if [ -f "$DB_SRC" ]; then
            cp "$DB_SRC" EigoLens/Resources/wordnet.db
            echo "WordNet DB staged"
          else
            echo "ERROR: WordNet DB not found - required for release"
            exit 1
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          PP_PLIST=$(security cms -D -i "$PP_PATH")
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$PP_PLIST")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$PP_PLIST")
          echo "PP_UUID=$PP_UUID" >> "$GITHUB_ENV"
          echo "PP_NAME=$PP_NAME" >> "$GITHUB_ENV"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision
          echo "Profile: $PP_NAME ($PP_UUID)"

      - name: Archive
        env:
          EL_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project EigoLens.xcodeproj \
            -scheme EigoLens \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/EigoLens.xcarchive" \
            DEVELOPMENT_TEAM="$EL_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PP_UUID" \
            2>&1 | tee /tmp/xcodebuild.log | xcpretty || {
              echo "=== Archive errors ==="
              grep -A 5 "error:\|Undefined symbols\|ld:" /tmp/xcodebuild.log | tail -40
              exit 1
            }

      - name: Verify archive
        run: |
          APP_PATH="$RUNNER_TEMP/EigoLens.xcarchive/Products/Applications/EigoLens.app"
          ls -la "$APP_PATH" || { echo "Archive failed - no .app"; exit 1; }
          ls "$APP_PATH/wordnet.db" && echo "WordNet DB bundled" || echo "WARNING: wordnet.db missing"
          echo "=== Bundle ==="
          ls "$APP_PATH/" | head -20

      - name: Export IPA
        env:
          EL_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.private_keys
          echo -n "$ASC_API_KEY_CONTENT" | base64 --decode -o ~/.private_keys/AuthKey_"${ASC_API_KEY_ID}".p8

          cat > "$RUNNER_TEMP/ExportOptions.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${EL_TEAM_ID}</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.jworks.eigolens</key>
              <string>${PP_NAME}</string>
            </dict>
          </dict>
          </plist>
          PLIST

          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/EigoLens.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -authenticationKeyPath ~/.private_keys/AuthKey_"${ASC_API_KEY_ID}".p8 \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID" \
            | xcpretty
          ls -la "$RUNNER_TEMP"/export/*.ipa 2>/dev/null || echo "Direct upload mode - no local IPA (uploaded via exportArchive)"

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f ~/.private_keys/AuthKey_*.p8 2>/dev/null || true
